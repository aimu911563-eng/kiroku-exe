<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>inventory 管理画面</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #e5e7eb;
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 16px;
      }

      .header {
        margin-bottom: 16px;
      }

      .title {
        margin: 0;
        font-size: 28px;
        font-weight: 800;
      }

      .sub {
        margin-top: 6px;
        color: var(--muted);
        font-size: 14px;
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .grid-top {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid-bottom {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-top: 16px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 16px;
      }

      .card h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 8px 0;
        border-bottom: 1px solid #f1f5f9;
      }

      .row:last-child {
        border-bottom: none;
      }

      .label {
        color: var(--muted);
        font-size: 14px;
      }

      .value {
        font-weight: 700;
        text-align: right;
      }

      .big {
        font-size: 28px;
        font-weight: 800;
      }

      .muted {
        color: var(--muted);
      }

      .status-done {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: #dcfce7;
        color: #166534;
        font-weight: 700;
        font-size: 13px;
      }

      .status-pending {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: #fee2e2;
        color: #991b1b;
        font-weight: 700;
        font-size: 13px;
      }

      .rank-list,
      .item-list {
        display: grid;
        gap: 10px;
      }

      .rank-item,
      .item-row {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: #fafafa;
      }

      .rank-top {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-weight: 700;
      }

      .rank-sub,
      .item-sub {
        margin-top: 6px;
        font-size: 13px;
        color: var(--muted);
      }

      .section-title {
        margin: 24px 0 12px;
        font-size: 20px;
        font-weight: 800;
      }

      .loading,
      .error {
        padding: 24px;
        text-align: center;
        color: var(--muted);
      }

      .error {
        color: #b91c1c;
      }

      @media (max-width: 900px) {
        .grid-top,
        .grid-bottom {
          grid-template-columns: 1fr;
        }

        .title {
          font-size: 24px;
        }

        .big {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="header">
        <h1 class="title">invenroty 管理画面</h1>
        <div class="sub" id="pageSub">読み込み中...</div>
      </header>

      <div id="loading" class="loading">管理画面を読み込み中...</div>
      <div id="error" class="error" style="display: none;"></div>

      <main id="app" style="display: none;">
        <section class="grid grid-top">
          <article class="card">
            <h2>今日の予測売上</h2>
            <div class="big" id="forecastSales">-</div>
            <div class="muted" id="summaryDate">-</div>
          </article>

          <article class="card">
            <h2>天気</h2>
            <div class="row">
              <div class="label">天気</div>
              <div class="value" id="weatherLabel">-</div>
            </div>
            <div class="row">
              <div class="label">最高気温</div>
              <div class="value" id="weatherTempMax">-</div>
            </div>
            <div class="row">
              <div class="label">雨が降りそうな時間</div>
              <div class="value" id="weatherRainHours">-</div>
            </div>
          </article>
        </section>

        <section class="grid grid-bottom">
          <article class="card">
            <h2>今日の掃除状況</h2>
            <div class="row">
              <div class="label">タスク</div>
              <div class="value" id="cleaningTask">-</div>
            </div>
            <div class="row">
              <div class="label">状態</div>
              <div class="value" id="cleaningStatus">-</div>
            </div>
            <div class="row">
              <div class="label">完了者</div>
              <div class="value" id="cleaningBy">-</div>
            </div>
            <div class="row">
              <div class="label">完了時刻</div>
              <div class="value" id="cleaningAt">-</div>
            </div>
          </article>

          <article class="card">
            <h2>今月の掃除ランキング TOP5</h2>
            <div class="rank-list" id="rankingList"></div>
          </article>
        </section>

        <h2 class="section-title">在庫必要量一覧</h2>

        <section class="grid grid-bottom">
          <article class="card">
            <h2>Main 食材</h2>
            <div class="item-list" id="mainItems"></div>
          </article>

          <article class="card">
            <h2>Side 資材</h2>
            <div class="item-list" id="sideItems"></div>
          </article>
        </section>
      </main>
    </div>

    <script type="module" src="/src/inventory-admin.ts"></script>
  </body>
</html>
