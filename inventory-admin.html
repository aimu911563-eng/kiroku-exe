<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>inventory 管理画面</title>
    <style>
      :root {
        --bg: #f3f4f6;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #e5e7eb;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        --radius: 20px;
        --accent: #111827;
        --success-bg: #dcfce7;
        --success-text: #166534;
        --pending-bg: #fee2e2;
        --pending-text: #991b1b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      body {
        min-height: 100vh;
      }

      .wrap {
        max-width: 1280px;
        margin: 0 auto;
        padding: 18px;
      }

      .header {
        margin-bottom: 18px;
      }

      .title {
        margin: 0;
        font-size: 34px;
        font-weight: 900;
        letter-spacing: -0.02em;
      }

      .sub {
        margin-top: 8px;
        color: var(--muted);
        font-size: 16px;
      }

      .grid {
        display: grid;
        gap: 18px;
      }

      .grid-top {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-items: stretch;
      }

      .grid-main {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-items: stretch;
        margin-top: 18px;
      }

      .grid-stock {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-items: start;
        margin-top: 18px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 18px;
        min-height: 100%;
      }

      .card h2 {
        margin: 0 0 14px;
        font-size: 18px;
        font-weight: 900;
        letter-spacing: -0.01em;
      }

      .hero-card {
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 190px;
      }

      .hero-value {
        font-size: 50px;
        font-weight: 900;
        letter-spacing: -0.03em;
        margin: 8px 0 4px;
      }

      .hero-sub {
        color: var(--muted);
        font-size: 15px;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
        padding: 12px 0;
        border-bottom: 1px solid #eef2f7;
      }

      .row:last-child {
        border-bottom: none;
      }

      .label {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
        flex: 0 0 88px;
      }

      .value {
        font-weight: 800;
        font-size: 17px;
        text-align: right;
        line-height: 1.5;
        word-break: break-word;
      }

      .status-done,
      .status-pending {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 7px 14px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 800;
        white-space: nowrap;
      }

      .status-done {
        background: var(--success-bg);
        color: var(--success-text);
      }

      .status-pending {
        background: var(--pending-bg);
        color: var(--pending-text);
      }

      .section-title {
        margin: 24px 0 0;
        font-size: 24px;
        font-weight: 900;
        letter-spacing: -0.02em;
      }

      .rank-list,
      .item-list {
        display: grid;
        gap: 12px;
      }

      .rank-item {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px 16px;
        background: linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
        opacity: 0;
        transform: translateY(8px);
        animation: fadeUp 0.35s ease forwards;
      }

      .rank-item:nth-child(1) { animation-delay: 0.02s; }
      .rank-item:nth-child(2) { animation-delay: 0.06s; }
      .rank-item:nth-child(3) { animation-delay: 0.10s; }
      .rank-item:nth-child(4) { animation-delay: 0.14s; }
      .rank-item:nth-child(5) { animation-delay: 0.18s; }

      .rank-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        font-weight: 900;
        font-size: 18px;
      }

      .rank-top-left {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .rank-badge {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 900;
        background: #eef2ff;
        color: #3730a3;
        flex: 0 0 34px;
      }

      .rank-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .rank-points {
        flex: 0 0 auto;
      }

      .rank-sub {
        margin-top: 6px;
        font-size: 14px;
        color: var(--muted);
      }

      .item-row {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px 14px 12px;
        background: #fcfcfd;
      }

      .item-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .item-name {
        font-size: 17px;
        font-weight: 900;
        line-height: 1.4;
      }

      .item-qty {
        flex: 0 0 auto;
        text-align: right;
      }

      .item-qty-main {
        font-size: 24px;
        font-weight: 900;
        line-height: 1;
      }

      .item-qty-sub {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
      }

      .item-meta {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        background: #f3f4f6;
        color: #374151;
      }

      .loading,
      .error {
        padding: 26px;
        text-align: center;
        font-size: 15px;
        color: var(--muted);
      }

      .error {
        color: #b91c1c;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 1024px) {
        .hero-value {
          font-size: 42px;
        }
      }

      @media (max-width: 860px) {
        .grid-top,
        .grid-main,
        .grid-stock {
          grid-template-columns: 1fr;
        }

        .title {
          font-size: 28px;
        }

        .hero-card {
          min-height: 160px;
        }

        .hero-value {
          font-size: 38px;
        }
      }

      @media (max-width: 640px) {
        .wrap {
          padding: 12px;
        }

        .card {
          padding: 16px;
          border-radius: 18px;
        }

        .title {
          font-size: 26px;
        }

        .sub {
          font-size: 14px;
        }

        .row {
          gap: 10px;
        }

        .label {
          flex-basis: 72px;
          font-size: 14px;
        }

        .value {
          font-size: 15px;
        }

        .hero-value {
          font-size: 34px;
        }

        .item-qty-main {
          font-size: 22px;
        }

        .rank-top {
          font-size: 16px;
        }

        .section-title {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="header">
        <h1 class="title">inventory 管理画面</h1>
        <div class="sub" id="pageSub">読み込み中...</div>
      </header>

      <div id="loading" class="loading">管理画面を読み込み中...</div>
      <div id="error" class="error" style="display: none;"></div>

      <main id="app" style="display: none;">
        <section class="grid grid-top">
          <article class="card">
            <h2>今日の予測売上</h2>
            <div class="big" id="forecastSales">-</div>
            <div class="muted" id="summaryDate">-</div>
          </article>

          <article class="card">
            <h2>天気</h2>
            <div class="row">
              <div class="label">天気</div>
              <div class="value" id="weatherLabel">-</div>
            </div>
            <div class="row">
              <div class="label">最高気温</div>
              <div class="value" id="weatherTempMax">-</div>
            </div>
            <div class="row">
              <div class="label">雨が降りそうな時間</div>
              <div class="value" id="weatherRainHours">-</div>
            </div>
          </article>
        </section>

        <section class="grid grid-bottom">
          <article class="card">
            <h2>今日の掃除状況</h2>
            <div class="row">
              <div class="label">タスク</div>
              <div class="value" id="cleaningTask">-</div>
            </div>
            <div class="row">
              <div class="label">状態</div>
              <div class="value" id="cleaningStatus">-</div>
            </div>
            <div class="row">
              <div class="label">完了者</div>
              <div class="value" id="cleaningBy">-</div>
            </div>
            <div class="row">
              <div class="label">完了時刻</div>
              <div class="value" id="cleaningAt">-</div>
            </div>
          </article>

          <article class="card">
            <h2>今月の掃除ランキング TOP5</h2>
            <div class="rank-list" id="rankingList"></div>
          </article>
        </section>

        <h2 class="section-title">在庫必要量一覧</h2>

        <section class="grid grid-bottom">
          <article class="card">
            <h2>Main 食材</h2>
            <div class="item-list" id="mainItems"></div>
          </article>

          <article class="card">
            <h2>Side 資材</h2>
            <div class="item-list" id="sideItems"></div>
          </article>
        </section>
      </main>
    </div>

    <script type="module" src="/src/inventory-admin.ts"></script>
  </body>
</html>
