
<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShiftFlow Admin</title>
</head>
<body>
  <div style="max-width:520px;margin:40px auto;font-family:system-ui;">
    <h1>ShiftFlow 管理画面</h1>

    <section id="loginBox" style="margin-top:16px;padding:16px;border:1px solid #ddd;border-radius:12px;">
      <p style="margin:0 0 12px;">管理者パスワード</p>
      <input id="pw" type="password" placeholder="password" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;" />
      <label style="display: block;" margin-top:12px;>
        店舗
        <select id="store" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; ">
            <option value="">選択してください</option>
            <option value="terajima">寺島</option>
            <option value="hamakita">浜北小松</option>
            <option value="kosai">湖西</option>
        </select>
      </label>
      <button id="loginBtn" style="margin-top:12px;padding:10px 14px;">ログイン</button>
      <p id="loginMsg" style="margin:12px 0 0;color:#b00;"></p>
    </section>

    <section id="adminBox" style="display:none;margin-top:16px;padding:16px;border:1px solid #ddd;border-radius:12px;">
      <div style="display:flex; gap:8px; margin-bottom:12px;">
        <button id="loadBtn" >サマリ</button>
        <button id="logoutBtn">ログアウト</button>
        <div style="margin: 12px 0; display: flex; gap:8px; align-items: center;">
            <input id="weekStart" type="date" style="padding: 8px;"/>
            <button id="loadSubmissionsBtn">提出一覧</button>
      </div>

      <div id="tableWrap"></div>
      <pre id="out" style="margin-top:12px;background:#f6f6f6;padding:12px;border-radius:12px;overflow:auto;"></pre>
      <div id="detailModal" style="
        position: fixed; inset: 0; background:rgba(0,0,0,.35);
        display: none; align-items: center; justify-content: center; padding: 16px;
        ">
          <div style="
            background: #fff; border-radius: 12px; width: min(720px, 100%);
            max-height: 80vh; overflow: auto; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.2);
            ">
              <div style="display: flex; align-items: center; justify-content: space-between; gap:8px;">
                <h3 id="detailTitle" style="margin: 0; font-size: 18px;">提出詳細</h3>
                <button id="detailCloseBtn" style="padding: 8px 12px;">閉じる</button>
              </div>

              <div id="detailBody" style="margin-top: 12px;"></div>
            </div>
        </div>
    </section>
  </div>

  <script type="module" src="/src/admin.ts"></script>
</body>
</html>
