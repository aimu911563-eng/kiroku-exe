
<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>ShiftFlow Admin</title>
  <style>
</style>

</head>
<body>
  <div style="max-width:980px;margin:40px auto;font-family:system-ui;">
    <h1>ShiftFlow 管理画面</h1>

    <section id="loginBox" style="margin-top:16px;padding:16px;border:1px solid #ddd;border-radius:12px;">
      <p style="margin:0 0 12px;">管理者パスワード</p>
      <input id="pw" type="password" placeholder="password" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;" />
      <label style="display: block;" margin-top:12px;>
        店舗
        <select id="store" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; ">
            <option value="">選択してください</option>
            <option value="terajima">寺島</option>
            <option value="hamakita">浜北小松</option>
            <option value="kosai">湖西</option>
        </select>
      </label>
      <button id="loginBtn" style="margin-top:12px;padding:10px 14px;">ログイン</button>
      <p id="loginMsg" style="margin:12px 0 0;color:#b00;"></p>
    </section>
    
    

    <div id="employeeModalOverlay" class="modalOverlay hidden">
        <div class="modalCard">
            <h3>新人登録</h3>

            <label>
                従業員番号（8桁）
                <input id="empIdInput" inputmode="numeric" maxlength="8" placeholder="72490001" />
            </label>

            <label>
                氏名
                <input id="empNameInput" maxlength="30" placeholder="中村 マルクス 光葉">
            </label>

            <label>
                初期PIN（4桁）
                <input id="empPinInput" inputmode="numeric" maxlength="4" placeholder="MMDD or 1234" />
                <small>誕生日なら 0305 みたいにゼロ埋め</small>
            </label>

            <div class="modalActions">
                <button id="closeEmployeeModal">キャンセル</button>
                <button id="submitEmployeeModal">登録</button>
            </div>

            <p id="employeeModalError" class="errorText hidden"></p>
        </div>
    </div>

    <section id="adminBox" 
      style="
        display: none; 
        margin-top: 16px; 
        padding: 20px; 
        border: 1px solid #ddd; 
        border-radius: 12px; 

        max-width: 980px;

        width: 100%;
        box-sizing: border-box;
        margin-left: auto;
        margin-right: auto;
        "
    >
        <div class="toolbar">
            <div class="toolbarLeft">
                <button id="openEmployeeModal" class="linkLike">新人登録はこちら</button>

                <button id="loadBtn" class="btn">サマリ</button>
                <button id="logoutBtn" class="btn btnGhost">ログアウト</button>
            </div>
            
            <div class="toolbarRight">
                <input id="weekStart" type="date" class="input">
                <button id="loadSubmissionsBtn" class="btn btnPrimary">提出一覧</button>
            </div>
        
            <div id="summaryLine" style="margin: 8px 0 12px; font-size: 13px; color: #333;"></div>

            <div id="tableWrap"></div>
              <pre id="out" style="margin-top:12px;background:#f6f6f6;padding:12px;border-radius:12px;overflow:auto;"></pre>
              <div id="detailModal" style="
                position: fixed; inset: 0; background:rgba(0,0,0,.35);
                display: none; align-items: center; justify-content: center; padding: 16px;
                ">
                  <div style="
                    background: #fff; border-radius: 12px; width: min(720px, 100%);
                    max-height: 80vh; overflow: auto; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.2);
                    ">
                      <div style="display: flex; align-items: center; justify-content: space-between; gap:8px;">
                        <h3 id="detailTitle" style="margin: 0; font-size: 18px;">提出詳細</h3>
                        <button id="detailCloseBtn" style="padding: 8px 12px;">閉じる</button>
                      </div>

                      <div id="detailBody" style="margin-top: 12px;"></div>
                </div>
            </div>
        </div>
    </section>
  </div>

  <script type="module" src="/src/admin.ts"></script>
</body>
</html>
